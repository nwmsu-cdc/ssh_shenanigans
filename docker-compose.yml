services:
  caddy:
    image: caddy:latest
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    ports:
      - "80:80"
    volumes:
      - $PWD/caddy_conf:/etc/caddy
      - $PWD/caddy_site:/srv
      - caddy_data:/data
      - caddy_config:/config
    networks:
      bastion_net:
        ipv4_address: 10.5.0.5

  bastion_server: 
    hostname: Bastion_Server
    restart: unless-stopped
    build: 
      context: .
      dockerfile: server
    ports:
      - "23:22"
    networks:
      bastion_net:
        ipv4_address: 10.5.0.6
      internal_net:
        ipv4_address: 10.6.0.6

  internal_server: 
    hostname: Internal_Server
    restart: unless-stopped
    build: 
      context: .
      dockerfile: server
    networks:
      internal_net:
        ipv4_address: 10.6.0.10
  internal2_server: 
    hostname: Internal2_Server
    restart: unless-stopped
    build: 
      context: .
      dockerfile: server
    networks:
      internal_net:
        ipv4_address: 10.6.0.11
      internal2_net:
        ipv4_address: 10.7.0.11

  caddy1:
    image: caddy:latest
    restart: unless-stopped
    volumes:
      - $PWD/internal_caddy/1/conf:/etc/caddy
      - $PWD/internal_caddy/1/site:/srv
    networks:
      internal_net:
        ipv4_address: 10.6.0.50

volumes:
  caddy_data:
  caddy_config:

networks:
  bastion_net: 
    driver: bridge
    ipam: 
      config:
        - subnet: 10.5.0.0/24
          gateway: 10.5.0.1
  internal_net: 
    driver: bridge
    ipam: 
      config:
        - subnet: 10.6.0.0/24
          gateway: 10.6.0.1
  internal2_net: 
    driver: bridge
    ipam: 
      config:
        - subnet: 10.7.0.0/24
          gateway: 10.7.0.1
